version: "3.9"

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — Primary data store
  # ---------------------------------------------------------------------------
  postgres:
    <<: *common
    image: postgres:16-alpine
    container_name: sov-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sovereign_ai}
      POSTGRES_USER: ${POSTGRES_USER:-sovereign}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5436}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./gateway/alembic/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sovereign} -d ${POSTGRES_DB:-sovereign_ai}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Qdrant — Vector store
  # ---------------------------------------------------------------------------
  qdrant:
    <<: *common
    image: qdrant/qdrant:v1.13.2
    container_name: sov-qdrant
    ports:
      - "${QDRANT_EXTERNAL_PORT:-6335}:6333"
      - "6336:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — Message queue, caching
  # ---------------------------------------------------------------------------
  redis:
    <<: *common
    image: redis:7-alpine
    container_name: sov-redis
    ports:
      - "${REDIS_EXTERNAL_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # vLLM — Production LLM serving (GPU)
  # ---------------------------------------------------------------------------
  vllm:
    <<: *common
    image: vllm/vllm-openai:latest
    container_name: sov-vllm
    ports:
      - "8010:8000"
    volumes:
      - ./models:/models:ro
      - vllm_cache:/root/.cache
    environment:
      VLLM_API_KEY: ""
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen2.5-1.5B-Instruct}
      --port 8000
      --host 0.0.0.0
      --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTILIZATION:-0.15}
      --max-model-len ${VLLM_MAX_MODEL_LEN:-4096}
      --max-num-seqs 4
      --enable-auto-tool-choice
      --tool-call-parser hermes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - gpu

  # ---------------------------------------------------------------------------
  # llama.cpp — Laptop/CPU LLM serving (fallback)
  # ---------------------------------------------------------------------------
  llama-cpp:
    <<: *common
    build:
      context: ./deploy/llama-cpp
      dockerfile: Dockerfile
    container_name: sov-llama-cpp
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models:ro
    command: >
      --server
      --host 0.0.0.0
      --port 8080
      --model /models/llm/default.gguf
      --ctx-size ${LLAMA_CPP_CONTEXT_SIZE:-8192}
      --n-gpu-layers ${LLAMA_CPP_GPU_LAYERS:-99}
      --parallel 2
      --cont-batching
    profiles:
      - cpu

  # ---------------------------------------------------------------------------
  # Gateway — FastAPI API server
  # ---------------------------------------------------------------------------
  gateway:
    <<: *common
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: sov-gateway
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8888:8888"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-sovereign_ai}
      POSTGRES_USER: ${POSTGRES_USER:-sovereign}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      REDIS_HOST: redis
      REDIS_PORT: 6379
      VLLM_HOST: ${VLLM_HOST:-vllm}
      VLLM_PORT: ${VLLM_PORT:-8000}
      LLAMA_CPP_HOST: ${LLAMA_CPP_HOST:-llama-cpp}
      LLAMA_CPP_PORT: ${LLAMA_CPP_PORT:-8080}
      WHISPER_HOST: ${WHISPER_HOST:-whisper}
      WHISPER_PORT: ${WHISPER_PORT:-9000}
      PIPER_HOST: ${PIPER_HOST:-piper}
      PIPER_PORT: ${PIPER_PORT:-9001}
      COMFYUI_HOST: ${COMFYUI_HOST:-comfyui}
      COMFYUI_PORT: ${COMFYUI_PORT:-8188}
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_PORT: 8888
      GATEWAY_SECRET_KEY: ${GATEWAY_SECRET_KEY:-dev-secret-change-in-production}
      GATEWAY_CORS_ORIGINS: ${GATEWAY_CORS_ORIGINS:-http://localhost:3000,http://100.105.220.14:3000}
      AIRGAP_MODE: ${AIRGAP_MODE:-false}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-sovereign-ai}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      SESSION_TIMEOUT_MINUTES: ${SESSION_TIMEOUT_MINUTES:-1440}
      MAX_CONCURRENT_SESSIONS: ${MAX_CONCURRENT_SESSIONS:-5}
      CLASSIFICATION_LEVELS: ${CLASSIFICATION_LEVELS:-UNCLASSIFIED,CUI,FOUO,SECRET}
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-365}
      SIEM_ENDPOINT: ${SIEM_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - file_storage:/data/files
      - watch_data:/data/watch

  # ---------------------------------------------------------------------------
  # Frontend — Next.js application
  # ---------------------------------------------------------------------------
  frontend:
    <<: *common
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sov-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8888}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Sovereign AI Hub}
    depends_on:
      - gateway

  # ---------------------------------------------------------------------------
  # Workers — Background document processing
  # ---------------------------------------------------------------------------
  workers:
    <<: *common
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: sov-workers
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-sovereign_ai}
      POSTGRES_USER: ${POSTGRES_USER:-sovereign}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MODEL_STORE_PATH: /models
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./models:/models:ro
      - file_storage:/data/files

  # ---------------------------------------------------------------------------
  # Whisper — Speech-to-text (whisper.cpp server)
  # ---------------------------------------------------------------------------
  whisper:
    <<: *common
    image: ghcr.io/ggerganov/whisper.cpp:main
    container_name: sov-whisper
    ports:
      - "9000:9000"
    volumes:
      - ./models/whisper:/models:ro
    command: >
      --server
      --host 0.0.0.0
      --port 9000
      --model /models/${WHISPER_MODEL:-ggml-base.en.bin}
      --threads ${WHISPER_THREADS:-4}
    profiles:
      - multimodal

  # ---------------------------------------------------------------------------
  # Piper — Text-to-speech server
  # ---------------------------------------------------------------------------
  piper:
    <<: *common
    image: rhasspy/wyoming-piper:latest
    container_name: sov-piper
    ports:
      - "9001:9001"
    volumes:
      - ./models/piper:/models:ro
      - piper_cache:/home/piper/.local
    environment:
      PIPER_VOICE: ${PIPER_VOICE:-en_US-lessac-medium}
      PIPER_PORT: 9001
    command: >
      --voice ${PIPER_VOICE:-en_US-lessac-medium}
      --data-dir /models
      --download-dir /home/piper/.local/share/piper
    profiles:
      - multimodal

  # ---------------------------------------------------------------------------
  # ComfyUI — Stable Diffusion image generation (GPU)
  # ---------------------------------------------------------------------------
  comfyui:
    <<: *common
    image: ghcr.io/ai-dock/comfyui:latest
    container_name: sov-comfyui
    ports:
      - "8188:8188"
    volumes:
      - ./models/stable-diffusion:/models:ro
      - comfyui_output:/output
    environment:
      CLI_ARGS: "--listen 0.0.0.0 --port 8188"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - multimodal
      - gpu

  # ---------------------------------------------------------------------------
  # Keycloak — Identity & Access Management (optional, Phase 6)
  # ---------------------------------------------------------------------------
  keycloak:
    <<: *common
    image: quay.io/keycloak/keycloak:latest
    container_name: sov-keycloak
    ports:
      - "8443:8443"
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-changeme_in_production}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sovereign_ai}
      KC_DB_USERNAME: ${POSTGRES_USER:-sovereign}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - keycloak_data:/opt/keycloak/data
    profiles:
      - security

volumes:
  pgdata:
    driver: local
  qdrant_data:
    driver: local
  redis_data:
    driver: local
  vllm_cache:
    driver: local
  file_storage:
    driver: local
  piper_cache:
    driver: local
  comfyui_output:
    driver: local
  keycloak_data:
    driver: local
  watch_data:
    driver: local
